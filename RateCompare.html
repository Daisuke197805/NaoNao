<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>レーティング比較</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --green:#2e7d32; --green2:#388e3c; --green-light:#e8f5e9;
      --danger:#c62828;
      --shadow:0 2px 14px rgba(0,0,0,.08); --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; padding:0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }

    /* ===== ヘッダー（グリーン系）===== */
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:linear-gradient(90deg, #2e7d32, #43a047);
      color:#fff;
      padding:12px 16px;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    header .row{
      display:flex;
      align-items:center;
      gap:12px;
      max-width:980px;
      margin:0 auto;
    }
    header .title{
      font-weight:800;
      letter-spacing:.02em;
    }
    header .links{
      margin-left:auto;
      display:flex;
      gap:12px;
      font-size:14px;
    }
    header a{
      color:#fff;
      text-decoration:none;
      background:rgba(255,255,255,.25);
      padding:6px 14px;
      border-radius:10px;
      font-weight:700;
      font-size:14px;
    }
    header a:hover{ background:rgba(255,255,255,.4); }

    /* ===== メイン ===== */
    main{
      max-width:600px;
      margin:0 auto;
      padding:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin:12px 0;
    }

    .section-label{
      font-weight:800;
      font-size:16px;
      margin-bottom:12px;
      padding-bottom:6px;
      border-bottom:2px solid var(--green);
      color:var(--green);
    }

    /* ===== フィールド行 ===== */
    .field{
      display:flex;
      align-items:center;
      gap:6px;
      margin-bottom:12px;
      flex-wrap:nowrap;
    }
    .field-label{
      font-size:13px;
      font-weight:700;
      color:var(--text);
      flex:0 0 80px;
      min-width:0;
    }
    .field-values{
      display:flex;
      align-items:center;
      gap:4px;
      flex:1 1 auto;
      min-width:0;
    }

    /* 入力欄（赤枠） */
    .input-red{
      font-size:16px;
      padding:10px 8px;
      border-radius:12px;
      border:2px solid #ef9a9a;
      background:#fff;
      outline:none;
      text-align:center;
    }
    .input-red:focus{
      border-color:#e53935;
      box-shadow:0 0 0 4px rgba(229,57,53,.15);
    }
    .input-rating{
      width:90px;
    }
    .input-time{
      width:48px;
    }
    .time-sep{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      flex-shrink:0;
    }

    /* 結果欄（黒枠） */
    .result-box{
      font-size:16px;
      padding:10px 12px;
      border-radius:12px;
      border:2px solid #424242;
      background:#fafafa;
      font-weight:700;
      text-align:center;
      flex:1 1 auto;
      min-width:0;
    }
    .result-box.negative{
      color:var(--danger);
      border-color:var(--danger);
    }

    /* 計算ボタン */
    .btn-calc{
      display:block;
      width:100%;
      font-size:16px;
      padding:14px;
      border-radius:12px;
      border:none;
      background:var(--green);
      color:#fff;
      font-weight:800;
      cursor:pointer;
      margin-top:8px;
      transition:background .15s;
    }
    .btn-calc:hover{ background:var(--green2); }
    .btn-calc:active{ transform:translateY(1px); }

    /* クリアボタン（✕） */
    .btn-clear{
      flex:0 0 auto;
      width:36px;
      height:36px;
      border-radius:50%;
      border:1px solid var(--border);
      background:#fff;
      color:var(--muted);
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      transition:background .15s, color .15s;
    }
    .btn-clear:hover{
      background:#fce4ec;
      color:var(--danger);
      border-color:var(--danger);
    }
    .btn-clear:active{
      transform:translateY(1px);
    }

    .note{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
      margin-top:10px;
    }
  </style>
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header>
    <div class="row">
      <div class="title">レーティング比較</div>
      <div class="links">
        <a href="./index.html">戻る</a>
      </div>
    </div>
  </header>

  <main>
    <!-- ===== naonao セクション ===== -->
    <div class="card">
      <div class="section-label">naonao</div>

      <div class="field">
        <div class="field-label">レーティング</div>
        <div class="field-values">
          <input type="text" id="rating1" class="input-red input-rating" inputmode="decimal" placeholder="1.16">
        </div>
      </div>

      <div class="field">
        <div class="field-label">レースタイム</div>
        <div class="field-values">
          <input type="text" id="raceH" class="input-red input-time" inputmode="numeric" placeholder="0">
          <span class="time-sep">h</span>
          <input type="text" id="raceM" class="input-red input-time" inputmode="numeric" placeholder="0">
          <span class="time-sep">m</span>
          <input type="text" id="raceS" class="input-red input-time" inputmode="numeric" placeholder="0">
          <span class="time-sep">s</span>
        </div>
      </div>

      <div class="field">
        <div class="field-label">修正タイム</div>
        <div class="field-values">
          <div class="result-box" id="correctedTime">—</div>
        </div>
      </div>
    </div>

    <!-- ===== 他艇セクション ===== -->
    <div class="card">
      <div class="section-label">他艇</div>

      <div class="field">
        <div class="field-label">レーティング</div>
        <div class="field-values">
          <input type="text" id="rating2" class="input-red input-rating" inputmode="decimal" placeholder="1.26">
          <button class="btn-clear" onclick="clearRating2()">✕</button>
        </div>
      </div>

      <div class="field">
        <div class="field-label">naonao比</div>
        <div class="field-values">
          <div class="result-box" id="diffTime">—</div>
        </div>
      </div>
    </div>

    <!-- ===== 計算ボタン ===== -->
    <button class="btn-calc" onclick="calculate()">計算する</button>

    <div class="note">
      ※ ルール①：レースタイム（秒）× レーティング ＝ 修正タイム（秒）<br>
      ※ ルール②：レースタイム（秒）× 他艇レーティング − 修正タイム → hh:mm:ss<br>
      ※ マイナスの場合は赤文字で表示されます（naonaoが速い＝有利）
    </div>
  </main>

  <script>
    // =========================
    // hh:mm:ss → 秒
    // =========================
    function toSeconds(h, m, s){
      return (parseFloat(h) || 0) * 3600
           + (parseFloat(m) || 0) * 60
           + (parseFloat(s) || 0);
    }

    // =========================
    // 秒 → hh:mm:ss（マイナス対応）
    // =========================
    function toHMS(totalSec){
      const negative = totalSec < 0;
      let abs = Math.abs(totalSec);

      const h = Math.floor(abs / 3600);
      abs -= h * 3600;
      const m = Math.floor(abs / 60);
      abs -= m * 60;
      const s = abs;

      const sStr = (s === Math.floor(s))
        ? String(Math.floor(s)).padStart(2, "0")
        : s.toFixed(2).padStart(5, "0");

      let result = "";
      if (h > 0) result += `${h}時間`;
      if (h > 0 || m > 0) result += `${String(m).padStart(2, "0")}分`;
      result += `${sStr}秒`;

      return (negative ? "−" : "") + result;
    }

    // =========================
    // 計算メイン
    // =========================
    function calculate(){
      const correctedEl = document.getElementById("correctedTime");
      const diffEl = document.getElementById("diffTime");

      const rating1 = parseFloat(document.getElementById("rating1").value);
      const rating2 = parseFloat(document.getElementById("rating2").value);
      const h = document.getElementById("raceH").value;
      const m = document.getElementById("raceM").value;
      const s = document.getElementById("raceS").value;

      if (isNaN(rating1) || rating1 <= 0){
        alert("naonaoのレーティングを正しく入力してください");
        return;
      }
      if (h === "" && m === "" && s === ""){
        alert("レースタイムを入力してください");
        return;
      }

      const raceSec = toSeconds(h, m, s);
      if (raceSec <= 0){
        alert("レースタイムは0より大きい値を入力してください");
        return;
      }

      // ルール①：修正タイム
      const corrected = raceSec * rating1;
      correctedEl.textContent = corrected.toFixed(2) + " 秒";
      correctedEl.classList.remove("negative");

      // ルール②：naonao比
      if (isNaN(rating2) || rating2 <= 0){
        diffEl.textContent = "他艇のレーティングを入力してください";
        diffEl.classList.remove("negative");
        return;
      }

      const otherCorrected = raceSec * rating2;
      const diff = otherCorrected - corrected;

      diffEl.textContent = toHMS(diff);

      if (diff < 0){
        diffEl.classList.add("negative");
      } else {
        diffEl.classList.remove("negative");
      }
    }

    // =========================
    // 他艇レーティングクリア
    // =========================
    function clearRating2(){
      document.getElementById("rating2").value = "";
      document.getElementById("diffTime").textContent = "—";
      document.getElementById("diffTime").classList.remove("negative");
    }

    // グローバル公開
    window.calculate = calculate;
    window.clearRating2 = clearRating2;
  </script>
</body>
</html>
