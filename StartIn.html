<!DOCTYPE html> <html lang="ja"> <head> <meta charset="utf-8"> <title>距離測定アプリ</title> <meta name="viewport" content="width=device-width, initial-scale=1.0">  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" /> <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>  <style> html, body {   margin: 0;   padding: 0;   height: 100%; }  #map {   position: fixed;   top: 0;   bottom: 0;   width: 100%; }  #distance {   position: fixed;   top: 10px;   width: 100%;   text-align: center;   font-size: 18px;   background: rgba(255,255,255,0.85);   padding: 8px;   z-index: 1000; }  .controls {   position: fixed;   bottom: 20px;   width: 100%;   display: flex;   justify-content: space-around;   z-index: 1000; }  .controls button {   font-size: 18px;   padding: 15px;   border-radius: 12px;   border: none;   color: white;   width: 28%; }  .btnA { background: #34C759; } .btnB { background: #007AFF; } .btnC { background: #FF3B30; } </style> </head>  <body>  <div id="map"></div> <div id="distance">距離: -- m</div>  <div class="controls">   <button class="btnA" onclick="setA()">A</button>   <button class="btnB" onclick="setB()">B</button>   <button class="btnC" onclick="start()">C</button> </div>  <script> let map; let posA = null; let posB = null; let markerA, markerB, markerC; let lineAB, linePerp; let intervalId = null;  /* ===== アイコン ===== */ const iconA = new L.Icon({   iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',   shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',   iconSize: [25, 41],   iconAnchor: [12, 41] });  const iconB = new L.Icon({   iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',   shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',   iconSize: [25, 41],   iconAnchor: [12, 41] });  const iconC = new L.Icon({   iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',   shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',   iconSize: [25, 41],   iconAnchor: [12, 41] });  /* ===== 初期化 ===== */ window.onload = () => {   setTimeout(initMap, 100); };  function initMap() {   map = L.map('map').setView([35.6812, 139.7671], 16);    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {     attribution: '&copy; OpenStreetMap contributors'   }).addTo(map);    setTimeout(() => map.invalidateSize(), 300); }  window.addEventListener('resize', () => {   if (map) map.invalidateSize(); });  /* ===== 位置取得 ===== */ function getLocation(callback) {   navigator.geolocation.getCurrentPosition(     pos => callback({       lat: pos.coords.latitude,       lng: pos.coords.longitude     }),     err => alert("位置情報エラー: " + err.message),     { enableHighAccuracy: true }   ); }  /* ===== A ===== */ function setA() {   getLocation(p => {     posA = p;     if (markerA) map.removeLayer(markerA);     markerA = L.marker([p.lat, p.lng], { icon: iconA }).addTo(map);     map.flyTo([p.lat, p.lng], 17);     drawABLine();   }); }  /* ===== B ===== */ function setB() {   getLocation(p => {     posB = p;     if (markerB) map.removeLayer(markerB);     markerB = L.marker([p.lat, p.lng], { icon: iconB }).addTo(map);     map.flyTo([p.lat, p.lng], 17);     drawABLine();   }); }  /* ===== AB延長線 ===== */ function drawABLine() {   if (!posA || !posB) return;    if (lineAB) map.removeLayer(lineAB);    let dx = posB.lng - posA.lng;   let dy = posB.lat - posA.lat;    let extend = 5;    let p1 = [posA.lat - dy * extend, posA.lng - dx * extend];   let p2 = [posB.lat + dy * extend, posB.lng + dx * extend];    lineAB = L.polyline([p1, p2], { color: 'blue', weight: 3 }).addTo(map); }  /* ===== 座標変換（正確） ===== */ function toXY(p) {   const R = 6378137;   return {     x: R * p.lng * Math.PI / 180,     y: R * Math.log(Math.tan(Math.PI/4 + (p.lat*Math.PI/180)/2))   }; }  function toLatLng(p) {   const R = 6378137;   return {     lng: (p.x / R) * 180 / Math.PI,     lat: (2 * Math.atan(Math.exp(p.y / R)) - Math.PI/2) * 180 / Math.PI   }; }  /* ===== C ===== */ function start() {   if (intervalId) return;    intervalId = setInterval(() => {     getLocation(posC => {        if (markerC) map.removeLayer(markerC);       markerC = L.marker([posC.lat, posC.lng], { icon: iconC }).addTo(map);        if (!posA || !posB) return;        let A = toXY(posA);       let B = toXY(posB);       let C = toXY(posC);        let AB = { x: B.x - A.x, y: B.y - A.y };       let AC = { x: C.x - A.x, y: C.y - A.y };        let t = (AB.x*AC.x + AB.y*AC.y) / (AB.x*AB.x + AB.y*AB.y);        let foot = {         x: A.x + t * AB.x,         y: A.y + t * AB.y       };        let dx = C.x - foot.x;       let dy = C.y - foot.y;       let distance = Math.sqrt(dx*dx + dy*dy);        document.getElementById("distance").innerText =         "距離: " + Math.round(distance) + " m";        let footLatLng = toLatLng(foot);        if (linePerp) map.removeLayer(linePerp);       linePerp = L.polyline([         [posC.lat, posC.lng],         [footLatLng.lat, footLatLng.lng]       ], { color: 'green', weight: 4 }).addTo(map);      });   }, 1000); } </script>  </body> </html>
