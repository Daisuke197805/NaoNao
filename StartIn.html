<!DOCTYPE html> <html> <head>   <meta charset="utf-8" />   <title>位置計測</title>   <meta name="viewport" content="width=device-width, initial-scale=1.0">    <!-- Leaflet -->   <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />   <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>    <style>     #map { height: 70vh; }     button { margin: 5px; padding: 10px; }   </style> </head> <body>  <div id="map"></div>  <button onclick="setA()">A</button> <button onclick="setB()">B</button> <button onclick="start()">C開始</button>  <p id="distance"></p>  <script> let map = L.map('map').setView([35.6812, 139.7671], 16); // 東京駅あたり  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);  let posA = null; let posB = null; let markerA, markerB, markerC; let lineAB, linePerp;  function getLocation(callback) {   navigator.geolocation.getCurrentPosition(pos => {     callback({       lat: pos.coords.latitude,       lng: pos.coords.longitude     });   }); }  function setA() {   getLocation(p => {     posA = p;     if (markerA) map.removeLayer(markerA);     markerA = L.marker([p.lat, p.lng]).addTo(map).bindPopup("A");   }); }  function setB() {   getLocation(p => {     posB = p;     if (markerB) map.removeLayer(markerB);     markerB = L.marker([p.lat, p.lng]).addTo(map).bindPopup("B");      if (lineAB) map.removeLayer(lineAB);     if (posA) {       lineAB = L.polyline([[posA.lat, posA.lng],[p.lat, p.lng]]).addTo(map);     }   }); }  function start() {   setInterval(() => {     getLocation(posC => {        if (markerC) map.removeLayer(markerC);       markerC = L.marker([posC.lat, posC.lng]).addTo(map).bindPopup("C");        if (!posA || !posB) return;        // 簡易平面変換       function toXY(p) {         return {           x: p.lng * 111320 * Math.cos(p.lat * Math.PI/180),           y: p.lat * 110540         };       }        let A = toXY(posA);       let B = toXY(posB);       let C = toXY(posC);        let AB = {x: B.x - A.x, y: B.y - A.y};       let AC = {x: C.x - A.x, y: C.y - A.y};        let t = (AB.x*AC.x + AB.y*AC.y) / (AB.x*AB.x + AB.y*AB.y);        let foot = {         x: A.x + t * AB.x,         y: A.y + t * AB.y       };        // 距離       let dx = C.x - foot.x;       let dy = C.y - foot.y;       let distance = Math.sqrt(dx*dx + dy*dy);        document.getElementById("distance").innerText =         "距離: " + Math.round(distance) + " m";        // 垂線描画       function toLatLng(p) {         return {           lat: p.y / 110540,           lng: p.x / (111320 * Math.cos(p.y / 110540 * Math.PI/180))         };       }        let footLatLng = toLatLng(foot);        if (linePerp) map.removeLayer(linePerp);       linePerp = L.polyline([         [posC.lat, posC.lng],         [footLatLng.lat, footLatLng.lng]       ], {color:'red'}).addTo(map);      });   }, 1000); } </script>  </body> </html>
