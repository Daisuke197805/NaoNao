 <!DOCTYPE html> <html lang="ja"> <head> <meta charset="utf-8"> <title>距離測定アプリ</title> <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Leaflet（安定CDN） --> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" /> <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>  <style> html, body {   margin: 0;   padding: 0;   height: 100%; }  #map {   height: 100vh;   width: 100vw; }  /* ボタンエリア */ .controls {   position: fixed;   bottom: 20px;   left: 0;   width: 100%;   display: flex;   justify-content: space-around;   z-index: 1000; }  /* ボタン */ .controls button {   font-size: 18px;   padding: 15px;   border-radius: 12px;   border: none;   color: white;   width: 30%; }  .btnA { background: #34C759; } .btnB { background: #007AFF; } .btnC { background: #FF3B30; }  /* 距離表示 */ #distance {   position: fixed;   top: 10px;   left: 0;   width: 100%;   text-align: center;   font-size: 18px;   background: rgba(255,255,255,0.85);   padding: 8px;   z-index: 1000; } </style> </head>  <body>  <div id="map"></div>  <div id="distance">距離: -- m</div>  <div class="controls">   <button class="btnA" onclick="setA()">A</button>   <button class="btnB" onclick="setB()">B</button>   <button class="btnC" onclick="start()">C</button> </div>  <script> let map; let posA = null; let posB = null; let markerA, markerB, markerC; let lineAB, linePerp; let intervalId = null;  // 初期化（ここ重要） window.onload = () => {   map = L.map('map').setView([35.6812, 139.7671], 16);    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {     attribution: '&copy; OpenStreetMap contributors'   }).addTo(map);    // サイズ問題対策   setTimeout(() => {     map.invalidateSize();   }, 500); };  // 位置取得 function getLocation(callback) {   navigator.geolocation.getCurrentPosition(pos => {     callback({       lat: pos.coords.latitude,       lng: pos.coords.longitude     });   }); }  // A function setA() {   getLocation(p => {     posA = p;     if (markerA) map.removeLayer(markerA);     markerA = L.marker([p.lat, p.lng]).addTo(map).bindPopup("A");   }); }  // B function setB() {   getLocation(p => {     posB = p;     if (markerB) map.removeLayer(markerB);     markerB = L.marker([p.lat, p.lng]).addTo(map).bindPopup("B");      if (lineAB) map.removeLayer(lineAB);     if (posA) {       lineAB = L.polyline([         [posA.lat, posA.lng],         [p.lat, p.lng]       ]).addTo(map);     }   }); }  // C開始 function start() {   if (intervalId) return;    intervalId = setInterval(() => {     getLocation(posC => {        if (markerC) map.removeLayer(markerC);       markerC = L.marker([posC.lat, posC.lng]).addTo(map).bindPopup("C");        if (!posA || !posB) return;        // 平面変換       function toXY(p) {         return {           x: p.lng * 111320 * Math.cos(p.lat * Math.PI/180),           y: p.lat * 110540         };       }        let A = toXY(posA);       let B = toXY(posB);       let C = toXY(posC);        let AB = {x: B.x - A.x, y: B.y - A.y};       let AC = {x: C.x - A.x, y: C.y - A.y};        let t = (AB.x*AC.x + AB.y*AC.y) / (AB.x*AB.x + AB.y*AB.y);        let foot = {         x: A.x + t * AB.x,         y: A.y + t * AB.y       };        // 距離       let dx = C.x - foot.x;       let dy = C.y - foot.y;       let distance = Math.sqrt(dx*dx + dy*dy);        document.getElementById("distance").innerText =         "距離: " + Math.round(distance) + " m";        // 垂線描画       function toLatLng(p) {         return {           lat: p.y / 110540,           lng: p.x / (111320 * Math.cos(p.y / 110540 * Math.PI/180))         };       }        let footLatLng = toLatLng(foot);        if (linePerp) map.removeLayer(linePerp);       linePerp = L.polyline([         [posC.lat, posC.lng],         [footLatLng.lat, footLatLng.lng]       ], {color:'red'}).addTo(map);      });   }, 1000); } </script>  </body> </html>
