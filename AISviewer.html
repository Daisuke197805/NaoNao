<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="utf-8">

<title>AIS表示</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

html, body {

  margin: 0;

  height: 100%;

}

#map {

  width: 100%;

  height: 100%;

}

</style>

</head>

<body>

<div id="map"></div>

<script>
console.log(data);
const API_KEY = "ec11fdc799701ab614b7e7e59020172c693f77ed";

let map;

let ships = {};

let socket;

window.onload = () => {

  setTimeout(initMap, 100);

};

function initMap() {

  map = L.map('map').setView([35.6, 139.7], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    attribution: '&copy; OpenStreetMap contributors'

  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 300);

  getMyLocation();

}

function getMyLocation() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;

    const lng = pos.coords.longitude;

    map.setView([lat, lng], 10);

    startAIS(lat, lng);

  }, err => {

    alert("位置情報エラー: " + err.message);

  });

}

function startAIS(lat, lng) {

  const delta = 1.0;

  socket = new WebSocket("wss://stream.aisstream.io/v0/stream");

  socket.onopen = () => {

    socket.send(JSON.stringify({

      APIKey: API_KEY,

      BoundingBoxes: [[

        [lat - delta, lng - delta],

        [lat + delta, lng + delta]

      ]]

    }));

  };

  socket.onmessage = (msg) => {

  const data = JSON.parse(msg.data);

  if (!data.Message) return;

  // ★ここが重要（複数対応）

  let report =

    data.Message.PositionReport ||

    data.Message.StandardClassBPositionReport;

  if (!report) return;

  const mmsi = report.UserID;

  const lat = report.Latitude;

  const lng = report.Longitude;

  if (!lat || !lng) return;

  updateShip(mmsi, lat, lng);

};
}

function updateShip(mmsi, lat, lng) {

  if (ships[mmsi]) {

    ships[mmsi].setLatLng([lat, lng]);

  } else {

    let marker = L.circleMarker([lat, lng], {

      radius: 5,

      color: 'blue'

    }).addTo(map);

    ships[mmsi] = marker;

  }

}

</script>

</body>

</html>
