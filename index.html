<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>マリーナ天気（Windy）</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --brand:#1976d2;
      --border:#e5e7eb;
      --shadow:0 2px 14px rgba(0,0,0,.08);
      --radius:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:linear-gradient(90deg, #1565c0, #1976d2);
      color:#fff;
      padding:12px 16px;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    header .row{
      display:flex;
      align-items:center;
      gap:12px;
      max-width:980px;
      margin:0 auto;
    }
    header .title{
      font-weight:800;
      letter-spacing:.02em;
    }
    header .links{
      margin-left:auto;
      display:flex;
      gap:12px;
      font-size:14px;
      opacity:.95;
    }
    header a{
      color:#fff;
      text-decoration:underline;
      text-underline-offset:3px;
    }

    main{
      max-width:980px;
      margin:0 auto;
      padding:12px;
      display:grid;
      gap:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .controls label{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }
    select, button{
      font-size:16px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    select:focus, button:focus{
      border-color:#90caf9;
      box-shadow:0 0 0 4px rgba(144,202,249,.35);
    }
    button{
      cursor:pointer;
      background:#fff;
    }
    .btn-primary{
      background:var(--brand);
      border-color:transparent;
      color:#fff;
      font-weight:800;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
      margin-top:8px;
    }

    /* iframe をスマホでもいい感じに（高さはvhで確保） */
    .frameWrap{
      padding:0;
      overflow:hidden;
    }
    iframe{
      width:100%;
      height:75vh;
      border:0;
      display:block;
    }

    .footerNote{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }
    .badge{
      display:inline-block;
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      background:#eef3ff;
      color:#1a3e8a;
      margin-right:6px;
      border:1px solid #dbe7ff;
    }
  </style>
</head>

<body>
  <header>
    <div class="row">
      <div class="title">マリーナ天気（Windy）</div>
      <div class="links">
        <!-- events.html を作っている場合はリンクが生きます。無いなら消してOK -->
        <a href="./events.html">イベント</a>
      </div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="controls">
        <label for="place">地点</label>
        <select id="place">
          <option value="urayasu">浦安マリーナ（千葉県）</option>
          <option value="ybm">横浜ベイサイドマリーナ（神奈川県）</option>
        </select>

        <label for="overlay">表示</label>
        <select id="overlay">
          <option value="wind" selected>風</option>
          <option value="gust">ガスト（突風）</option>
          <option value="waves">波</option>
          <option value="rain">雨</option>
          <option value="temp">気温</option>
        </select>

        <label for="zoom">ズーム</label>
        <select id="zoom">
          <option value="8">広め</option>
          <option value="9" selected>標準</option>
          <option value="11">近く</option>
        </select>

        <button class="btn-primary" id="openBtn">Windyで開く</button>
      </div>

    </section>

    <section class="card frameWrap">
      <iframe id="windyFrame" allowfullscreen loading="lazy"></iframe>
    </section>

    <section class="card">
      <div class="footerNote">
        <div><span class="badge">座標ソース</span></div>
        <div>
          ・浦安マリーナ：Mapion掲載の中心点（35.62896904, 139.8975477）を使用。[1](https://wiki.openstreetmap.org/wiki/Leaflet-openweathermap)<br>
          ・横浜ベイサイドマリーナ：Wikipedia掲載の座標（35.38028, 139.64778）を使用。[2](https://qiita.com/nishifeoda/items/de3e8b7081a9381c0ce7)
        </div>
      </div>
    </section>
  </main>

  <script>
    // 地点（緯度経度）
    // 浦安マリーナ：Mapionの中心点情報（35.62896904, 139.8975477）[1](https://wiki.openstreetmap.org/wiki/Leaflet-openweathermap)
    // 横浜ベイサイドマリーナ：Wikipediaの座標（35.38028, 139.64778）[2](https://qiita.com/nishifeoda/items/de3e8b7081a9381c0ce7)
    const PLACES = {
      urayasu: { name: "浦安マリーナ（千葉県）", lat: 35.62896904, lon: 139.8975477 },
      ybm:     { name: "横浜ベイサイドマリーナ（神奈川県）", lat: 35.38028,   lon: 139.64778   }
    };

    // overlay値は Windy 側の仕様変更があり得ます。
    // まずは wind / temp / rain / waves あたりは実用上よく使われます。
    function buildWindyUrl(lat, lon, zoom, overlay){
      const params = new URLSearchParams({
        lat: String(lat),
        lon: String(lon),
        zoom: String(zoom),
        level: "surface",
        overlay: overlay,
        type: "map",
        location: "coordinates",
        metricWind: "default",
        metricTemp: "default",
        radarRange: "-1"
      });
      return `https://embed.windy.com/embed2.html?${params.toString()}`;
    }

    function updateFrame(){
      const placeKey = document.getElementById("place").value;
      const overlay  = document.getElementById("overlay").value;
      const zoom     = document.getElementById("zoom").value;

      const p = PLACES[placeKey];
      const url = buildWindyUrl(p.lat, p.lon, zoom, overlay);
      document.getElementById("windyFrame").src = url;

      // 「Windyで開く」ボタン用に保持
      document.getElementById("openBtn").dataset.url = url;
    }

    document.getElementById("place").addEventListener("change", updateFrame);
    document.getElementById("overlay").addEventListener("change", updateFrame);
    document.getElementById("zoom").addEventListener("change", updateFrame);

    document.getElementById("openBtn").addEventListener("click", () => {
      const url = document.getElementById("openBtn").dataset.url;
      window.open(url, "_blank", "noopener");
    });

    // 初期表示
    updateFrame();
  </script>
</body>
</html>
