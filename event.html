<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>イベント管理（参加表明）</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; margin: 0; background: #f6f7fb; }
    h1 { margin: 8px 0 6px; }
    .muted { color: #666; font-size: 13px; line-height: 1.5; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .card { background:#fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 10px 0; }
    button { font-size: 15px; padding: 10px 12px; border-radius: 10px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    button.primary { background:#1976d2; color:#fff; border-color:#1976d2; font-weight:700; }
    input { font-size: 15px; padding: 10px 10px; border-radius: 10px; border: 1px solid #bbb; min-width: 180px; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .pill { display:inline-block; padding:3px 10px; border-radius:999px; background:#eef3ff; border:1px solid #dbe7ff; color:#1a3e8a; font-size:12px; margin-right:6px; }
    .participants { margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
    .participants .name { background:#f3f4f6; border:1px solid #e5e7eb; padding:4px 10px; border-radius:999px; font-size:12px; }
  </style>
</head>
<body>
  <h1>イベント管理（参加表明）</h1>
  <p class="muted">
    Step5-2：イベント一覧を表示し、各イベントに<b>参加表明（複数人）</b>できるようにします。<br>
    ※データ保存はGoogleスプレッドシート（tbl_participant）です。
  </p>

  <div class="row">
    <button class="primary" onclick="reloadAll()">イベントを読み込む</button>
    <span class="muted">（取得：getEvents / 参加：joinEvent / 参加者：getParticipants）</span>
  </div>

  <pre id="raw" class="card">(ここに進捗/エラーを表示)</pre>
  <div id="list"></div>

  <script>
    // ★固定（あなたのGAS WebアプリURL）
    const API_URL = "https://script.google.com/macros/s/AKfycbzaLPhysJ3_e18Hk25-dumu7324yqDwE7KWgqegPYd9j-6d5eiZsoP5Tze2KcnKkKOcEw/exec";

    const raw = document.getElementById("raw");
    const list = document.getElementById("list");

    function show(msg) { raw.textContent = msg; }

    // 日付/時刻整形（表示用）
    function formatDateJST(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}/${m}/${day}`;
    }
    function formatTimeHHMM(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[c]));
    }

    // CORSプリフライト回避：フォームPOST統一
    async function postForm(paramsObj) {
      const body = new URLSearchParams(paramsObj);
      const res = await fetch(API_URL, { method: "POST", body });
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); }
      catch { throw new Error("JSON解析失敗: " + text.slice(0, 200)); }
      return json;
    }

    async function getEvents() {
      return await postForm({ type: "getEvents" });
    }

    async function getParticipants() {
      return await postForm({ type: "getParticipants" });
    }

    async function joinEvent(eventId, name, note) {
      return await postForm({
        type: "joinEvent",
        event_id: eventId,
        participant_name: name,
        participant_note: note || ""
      });
    }

    // 画面再描画
    async function reloadAll() {
      try {
        show("読み込み中...");

        const [evRes, ptRes] = await Promise.all([getEvents(), getParticipants()]);
        if (evRes.status !== "ok") throw new Error("getEvents失敗: " + (evRes.message || ""));
        if (ptRes.status !== "ok") throw new Error("getParticipants失敗: " + (ptRes.message || ""));

        const events = evRes.events || [];
        const participants = ptRes.participants || [];

        // event_id -> 参加者配列 のMap
        const byEvent = new Map();
        for (const p of participants) {
          const eid = String(p.event_id || "");
          if (!byEvent.has(eid)) byEvent.set(eid, []);
          byEvent.get(eid).push(p);
        }

        show(`OK：イベント ${events.length} 件 / 参加表明 ${participants.length} 件`);

        list.innerHTML = "";
        if (events.length === 0) {
          list.innerHTML = `<div class="card">イベントが0件です（tbl_eventを確認）</div>`;
          return;
        }

        for (const ev of events) {
          const eid = String(ev.event_id || "");
          const dateStr = formatDateJST(ev.event_date);
          const timeStr = formatTimeHHMM(ev.event_start);
          const mem = byEvent.get(eid) || [];

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="row" style="justify-content:space-between;">
              <div>
                <span class="pill">${escapeHtml(eid)}</span>
                <b>${escapeHtml(ev.event_name ?? "")}</b>
              </div>
              <div class="muted">${escapeHtml(dateStr)} ${escapeHtml(timeStr)}</div>
            </div>
            <div class="muted" style="margin-top:6px;">メモ：${escapeHtml(ev.event_memo ?? "")}</div>

            <div class="row" style="margin-top:12px;">
              <input id="name_${escapeHtml(eid)}" placeholder="名前（ニックネーム可）">
              <input id="note_${escapeHtml(eid)}" placeholder="備考（任意）">
              <button class="primary" onclick="handleJoin('${escapeHtml(eid)}')">参加</button>
            </div>

            <div class="muted" style="margin-top:10px;">参加者：${mem.length} 名</div>
            <div class="participants">
              ${mem.map(p => `<span class="name">${escapeHtml(p.participant_name ?? "")}</span>`).join("")}
            </div>
          `;
          list.appendChild(card);
        }

      } catch (err) {
        show("エラー:\n" + (err?.message || String(err)));
      }
    }

    // 参加ボタン処理
    async function handleJoin(eventId) {
      try {
        const nameEl = document.getElementById("name_" + eventId);
        const noteEl = document.getElementById("note_" + eventId);
        const name = (nameEl.value || "").trim();
        const note = (noteEl.value || "").trim();

        if (!name) {
          alert("名前を入力してください");
          return;
        }

        show(`参加表明送信中... event_id=${eventId}`);

        const res = await joinEvent(eventId, name, note);

        if (res.status === "ok") {
          alert("参加表明しました！");
          nameEl.value = "";
          noteEl.value = "";
          await reloadAll(); // 再取得して参加者数を反映
          return;
        }

        if (res.status === "exists") {
          alert("すでに参加しています（同名の参加表明が存在します）。");
          await reloadAll();
          return;
        }

        throw new Error(res.message || "参加表明に失敗しました");

      } catch (err) {
        show("参加表明エラー:\n" + (err?.message || String(err)));
        alert("参加表明に失敗しました。画面のエラー表示を確認してください。");
      }
    }

    // グローバル公開
    window.reloadAll = reloadAll;
    window.handleJoin = handleJoin;

    // 初期表示
    show("ページ読込完了：ボタンで読み込んでください");
  </script>
</body>
</html>
