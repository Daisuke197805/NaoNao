<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>レース&イベント</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --brand:#1976d2; --brand2:#155fa8; --danger:#c62828; --danger2:#b71c1c;
      --accent:#f57c00; --accent2:#ef6c00;
      --shadow:0 2px 14px rgba(0,0,0,.08); --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; padding:0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }

    /* ===== ヘッダー ===== */
    header{
      position:sticky;
      top:0;
      z-index:10;
      background:linear-gradient(90deg, #fb8c00, #ffa726);
      color:#fff;
      padding:12px 16px;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }
    header .row{
      display:flex;
      align-items:center;
      gap:12px;
      max-width:980px;
      margin:0 auto;
    }
    header .title{
      font-weight:800;
      letter-spacing:.02em;
    }
    header .links{
      margin-left:auto;
      display:flex;
      gap:12px;
      font-size:14px;
    }
    header a{
      color:#fff;
      text-decoration:none;
      background:rgba(255,255,255,.25);
      padding:6px 14px;
      border-radius:10px;
      font-weight:700;
      font-size:14px;
    }
    header a:hover{ background:rgba(255,255,255,.4); }

    /* ===== メイン ===== */
    main{
      max-width:980px;
      margin:0 auto;
      padding:12px;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px; margin:12px 0; }
    .btn{ font-size:15px; padding:10px 12px; border-radius:12px; border:1px solid var(--border); background:#fff; cursor:pointer; }
    .btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
    .btn.primary:hover{ background:var(--accent2); border-color:var(--accent2); }
    .btn.danger{ background:var(--danger); border-color:var(--danger); color:#fff; font-weight:700; }
    .btn.danger:hover{ background:var(--danger2); border-color:var(--danger2); }
    .btn:active{ transform:translateY(1px); }

    input{ font-size:15px; padding:10px 10px; border-radius:12px; border:1px solid var(--border); background:#fff; }
    input:focus{ outline:none; border-color:#ffcc80; box-shadow:0 0 0 4px rgba(255,167,38,.25); }

    .pill{ display:inline-block; padding:3px 10px; border-radius:999px; background:#eef3ff; border:1px solid #dbe7ff; color:#1a3e8a; font-size:12px; }
    .muted{ color:var(--muted); font-size:13px; }
    .title{ font-weight:800; }
    .sep{ height:1px; background:var(--border); margin:10px 0; }

    /* ===== 日付 ===== */
    .event-date{ font-size:17px; font-weight:700; color:var(--text); }

    /* ===== 参加フォーム ===== */
    .join-row{ display:flex; gap:8px; align-items:center; flex-wrap:nowrap; }
    .join-row input{ flex:1 1 160px; min-width:0; }
    .join-row .btn{ flex:0 0 auto; white-space:nowrap; }
    .note-row{ margin-top:8px; }
    .note-row input{ width:100%; }

    /* ===== 取消フォーム ===== */
    .cancel-row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:nowrap;
      margin-top:8px;
    }
    .cancel-row input{ flex:1 1 160px; min-width:0; }
    .cancel-row .btn{ flex:0 0 auto; white-space:nowrap; }
    .cancel-toggle{
      font-size:12px;
      color:var(--muted);
      cursor:pointer;
      margin-top:8px;
      user-select:none;
      -webkit-user-select:none;
    }
    .cancel-toggle:hover{ color:var(--danger); }
    .cancel-form{ display:none; margin-top:6px; }
    .cancel-form.open{ display:block; }

    /* ===== 参加者 ===== */
    .participants{ margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
    .participants .name{
      background:#f3f4f6; border:1px solid #e5e7eb; padding:4px 10px;
      border-radius:999px; font-size:12px; cursor:pointer;
      user-select:none; -webkit-user-select:none; transition:background .15s;
    }
    .participants .name.has-note{ border-bottom:2px solid var(--accent); }
    .participants .name:active{ background:#e5e7eb; }

    /* ===== ポップアップ ===== */
    .popup-overlay{
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.35); justify-content:center; align-items:center; padding:24px;
    }
    .popup-overlay.active{ display:flex; }
    .popup-box{
      background:#fff; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,.18);
      padding:20px; max-width:340px; width:100%; text-align:left; animation:popIn .15s ease-out;
    }
    @keyframes popIn{ from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
    .popup-box .popup-name{ font-weight:800; font-size:16px; margin-bottom:8px; }
    .popup-box .popup-note{ font-size:14px; color:var(--text); line-height:1.6; white-space:pre-wrap; word-break:break-word; }
    .popup-box .popup-close{
      display:block; margin-top:14px; text-align:center; font-size:14px;
      color:var(--accent); font-weight:700; cursor:pointer; padding:8px;
      border-radius:10px; border:1px solid var(--accent); background:#fff;
    }
    .popup-box .popup-close:active{ background:#fff3e0; }

    pre{ white-space:pre-wrap; word-break:break-word; margin:0; font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:12px; }
    details summary{ cursor:pointer; color:var(--muted); font-size:13px; }
  </style>
</head>
<body>

  <header>
    <div class="row">
      <div class="title">レース＆イベント</div>
      <div class="links">
        <a href="./index.html">← 戻る</a>
      </div>
    </div>
  </header>

  <main>
    <div class="row">
      <button class="btn primary" onclick="reloadAll()">更新（イベント＆参加者を再取得）</button>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="title">状態</div>
        <span class="pill" id="statusPill">待機中</span>
      </div>
      <div class="sep"></div>
      <div class="muted" id="statusText">ページ読込完了：更新ボタンを押してください</div>

      <details style="margin-top:10px;">
        <summary>デバッグログ（必要なときだけ開く）</summary>
        <div class="sep"></div>
        <pre id="debug">(ログ)</pre>
      </details>
    </div>

    <div id="list"></div>
  </main>

  <!-- ===== ポップアップ ===== -->
  <div class="popup-overlay" id="popupOverlay" onclick="closePopup()">
    <div class="popup-box" onclick="event.stopPropagation()">
      <div class="popup-name" id="popupName"></div>
      <div class="popup-note" id="popupNote"></div>
      <div class="popup-close" onclick="closePopup()">閉じる</div>
    </div>
  </div>

  <script>
    // =========================
    // 固定：GAS WebアプリURL
    // =========================
    const API_URL = "https://script.google.com/macros/s/AKfycbzaLPhysJ3_e18Hk25-dumu7324yqDwE7KWgqegPYd9j-6d5eiZsoP5Tze2KcnKkKOcEw/exec";

    const list = document.getElementById("list");
    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");
    const debug = document.getElementById("debug");

    function setStatus(label, text){
      statusPill.textContent = label;
      statusText.textContent = text;
    }
    function logDebug(msg){
      const t = new Date().toISOString();
      debug.textContent = `${t}  ${msg}\n` + debug.textContent;
    }

    // =========================
    // 6桁 event_id 正規化
    // =========================
    function pad6(value){
      const s = String(value ?? "").trim();
      if (/^\d+$/.test(s)) return s.padStart(6, "0");
      return s;
    }

    // =========================
    // 表示整形
    // =========================
    const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];

    function formatDateJST(value){
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const w = WEEKDAYS[d.getDay()];
      return `${y}/${m}/${day}（${w}）`;
    }
    function formatTimeHHMM(value){
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${hh}:${mm}`;
    }
    function escapeHtml(str){
      return String(str ?? "").replace(/[&<>"']/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[c]));
    }

    // =========================
    // ポップアップ（備考表示）
    // =========================
    const popupOverlay = document.getElementById("popupOverlay");
    const popupName = document.getElementById("popupName");
    const popupNote = document.getElementById("popupNote");

    function showPopup(name, note){
      popupName.textContent = name;
      popupNote.textContent = note || "（備考なし）";
      popupOverlay.classList.add("active");
    }
    function closePopup(){
      popupOverlay.classList.remove("active");
    }
    window.showPopup = showPopup;
    window.closePopup = closePopup;

    // =========================
    // CORS回避：フォームPOST
    // =========================
    async function postForm(paramsObj){
      const body = new URLSearchParams(paramsObj);
      logDebug("POST " + JSON.stringify(paramsObj));

      const res = await fetch(API_URL, { method:"POST", body });

      if (!res.ok){
        const errText = await res.text();
        throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
      }

      const text = await res.text();

      let json;
      try{
        json = JSON.parse(text);
      }catch{
        throw new Error("JSON解析失敗（先頭200文字）: " + text.slice(0, 200));
      }
      return json;
    }

    // =========================
    // API呼び出し
    // =========================
    async function apiGetEvents(){
      return await postForm({ type: "getEvents" });
    }
    async function apiGetParticipants(){
      return await postForm({ type: "getParticipants" });
    }
    async function apiJoinEvent(eventId, name, note){
      return await postForm({
        type: "joinEvent",
        event_id: pad6(eventId),
        participant_name: name,
        participant_note: note || ""
      });
    }
    async function apiCancelEvent(eventId, name){
      return await postForm({
        type: "cancelEvent",
        event_id: pad6(eventId),
        participant_name: name
      });
    }

    // =========================
    // 画面構築
    // =========================
    function render(events, participants){
      const byEvent = new Map();
      for (const p of participants){
        const eid = pad6(p.event_id);
        if (!byEvent.has(eid)) byEvent.set(eid, []);
        byEvent.get(eid).push(p);
      }

      list.innerHTML = "";
      if (!events.length){
        list.innerHTML = `<div class="card">イベントが0件です（tbl_event を確認してください）</div>`;
        return;
      }

      for (const ev of events){
        const eid = pad6(ev.event_id);
        const dateStr = formatDateJST(ev.event_date);
        const timeStr = formatTimeHHMM(ev.event_start);
        const mem = byEvent.get(eid) || [];

        const card = document.createElement("div");
        card.className = "card";

        // 参加者ピル
        const pillsHtml = mem.map(p => {
          const name = escapeHtml(p.participant_name ?? "");
          const hasNote = (p.participant_note ?? "").trim() !== "";
          const cls = hasNote ? "name has-note" : "name";
          const nameForJs = (p.participant_name ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
          const noteForJs = (p.participant_note ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
          return `<span class="${cls}" onclick="showPopup('${nameForJs}','${noteForJs}')">${name}</span>`;
        }).join("");

        card.innerHTML = `
          <div class="row" style="justify-content:space-between;">
            <div>
              <span class="title">${escapeHtml(ev.event_name ?? "")}</span>
            </div>
          </div>

          <div class="event-date" style="margin-top:6px;">
            ${escapeHtml(dateStr)} ${escapeHtml(timeStr)}
          </div>

          <div class="muted" style="margin-top:6px;">
            メモ：${escapeHtml(ev.event_memo ?? "")}
          </div>

          <div class="sep"></div>

          <div class="join-row">
            <input id="name_${eid}" placeholder="名前">
            <button class="btn primary" onclick="handleJoin('${eid}')">参加</button>
          </div>

          <div class="note-row">
            <input id="note_${eid}" placeholder="備考（任意）">
          </div>

          <div class="muted" style="margin-top:10px;">参加者：${mem.length} 名</div>
          <div class="participants">
            ${pillsHtml}
          </div>

          <div class="cancel-toggle" onclick="toggleCancel('${eid}')">▸ 参加を取り消す場合はこちら</div>
          <div class="cancel-form" id="cancelForm_${eid}">
            <div class="cancel-row">
              <input id="cancelName_${eid}" placeholder="取り消す名前を入力">
              <button class="btn danger" onclick="handleCancel('${eid}')">取消</button>
            </div>
          </div>
        `;

        list.appendChild(card);
      }
    }

    // =========================
    // 取消フォームの開閉
    // =========================
    function toggleCancel(eid){
      const form = document.getElementById("cancelForm_" + eid);
      form.classList.toggle("open");
    }
    window.toggleCancel = toggleCancel;

    // =========================
    // メイン：再取得
    // =========================
    async function reloadAll(){
      try{
        setStatus("取得中", "イベント・参加者を取得しています...");
        logDebug("reloadAll start");

        const [evRes, ptRes] = await Promise.all([apiGetEvents(), apiGetParticipants()]);

        if (evRes.status !== "ok") throw new Error("getEvents失敗: " + (evRes.message || ""));
        if (ptRes.status !== "ok") throw new Error("getParticipants失敗: " + (ptRes.message || ""));

        const events = (evRes.events || []).map(e => ({ ...e, event_id: pad6(e.event_id) }));
        const participants = (ptRes.participants || []).map(p => ({ ...p, event_id: pad6(p.event_id) }));

        events.sort((a, b) => pad6(a.event_id).localeCompare(pad6(b.event_id)));

        setStatus("OK", `イベント ${events.length} 件`);
        render(events, participants);

        logDebug("reloadAll ok");
      }catch(err){
        setStatus("エラー", "取得に失敗しました。デバッグログを確認してください。");
        logDebug("ERROR: " + (err?.message || String(err)));
        alert("取得に失敗しました：" + (err?.message || String(err)));
      }
    }

    // =========================
    // 参加処理
    // =========================
    async function handleJoin(eventId){
      try{
        const eid = pad6(eventId);
        const nameEl = document.getElementById("name_" + eid);
        const noteEl = document.getElementById("note_" + eid);

        const name = (nameEl.value || "").trim();
        const note = (noteEl.value || "").trim();

        if (!name){
          alert("名前を入力してください");
          return;
        }

        setStatus("送信中", `参加登録を送信しています... event_id=${eid}`);
        logDebug(`joinEvent start event_id=${eid} name=${name}`);

        const res = await apiJoinEvent(eid, name, note);

        if (res.status === "ok"){
          alert("参加登録しました！");
          nameEl.value = "";
          noteEl.value = "";
          await reloadAll();
          return;
        }

        if (res.status === "exists"){
          alert("すでに参加登録しています（同名の参加登録が存在します）。");
          await reloadAll();
          return;
        }

        throw new Error(res.message || "参加表明に失敗しました");
      }catch(err){
        setStatus("エラー", "参加登録に失敗しました。デバッグログを確認してください。");
        logDebug("joinEvent ERROR: " + (err?.message || String(err)));
        alert("参加登録に失敗しました：" + (err?.message || String(err)));
      }
    }

    // =========================
    // 取消処理
    // =========================
    async function handleCancel(eventId){
      try{
        const eid = pad6(eventId);
        const cancelNameEl = document.getElementById("cancelName_" + eid);
        const name = (cancelNameEl.value || "").trim();

        if (!name){
          alert("取り消す名前を入力してください");
          return;
        }

        // 確認ダイアログ
        if (!confirm(`「${name}」さんの参加を取り消しますか？`)){
          return;
        }

        setStatus("送信中", `参加取消を送信しています... event_id=${eid}`);
        logDebug(`cancelEvent start event_id=${eid} name=${name}`);

        const res = await apiCancelEvent(eid, name);

        if (res.status === "ok"){
          alert("参加を取り消しました。");
          cancelNameEl.value = "";
          await reloadAll();
          return;
        }

        if (res.status === "not_found"){
          alert("該当する参加登録が見つかりませんでした。\n名前が正確に一致しているか確認してください。");
          return;
        }

        throw new Error(res.message || "参加取消に失敗しました");
      }catch(err){
        setStatus("エラー", "参加取消に失敗しました。デバッグログを確認してください。");
        logDebug("cancelEvent ERROR: " + (err?.message || String(err)));
        alert("参加取消に失敗しました：" + (err?.message || String(err)));
      }
    }

    // グローバル公開（onclick用）
    window.reloadAll = reloadAll;
    window.handleJoin = handleJoin;
    window.handleCancel = handleCancel;

    // 初期：自動で一度読み込み
    setStatus("待機中", "自動取得を開始します...");
    reloadAll();
  </script>
</body>
</html>
