<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>イベント一覧（テスト：デバッグ版）</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; margin: 0; background: #f6f7fb; }
    h1 { margin: 8px 0 6px; }
    .muted { color: #666; font-size: 13px; line-height: 1.5; }
    .card { background:#fff; border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin: 10px 0; }
    button { font-size: 16px; padding: 10px 12px; border-radius: 10px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    button:active { transform: translateY(1px); }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>イベント一覧（テスト：デバッグ版）</h1>
  <p class="muted">
    Step4：GASからイベント一覧を取得できるか確認します。<br>
    進捗がこの画面に表示されるので、Consoleを見なくても原因切り分けができます。
  </p>

  <!-- onclick 直書き：確実に動かすため -->
  <button id="loadBtn" onclick="loadEvents()">イベントを読み込む</button>

  <pre id="raw" class="card">(ここに進捗/JSON/エラーを表示)</pre>
  <div id="list"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzaLPhysJ3_e18Hk25-dumu7324yqDwE7KWgqegPYd9j-6d5eiZsoP5Tze2KcnKkKOcEw/exec";

  const raw = document.getElementById("raw");
  const list = document.getElementById("list");

  function show(msg){ raw.textContent = msg; }

  async function loadEvents() {
    try {
      show("1) ボタン押下：loadEvents() 開始");

      if (!API_URL || API_URL.includes("ここに")) {
        show("エラー：API_URL が未設定です");
        return;
      }

      show("2) fetch() 実行中…（フォーム形式でPOST）");

      // ★CORSのプリフライトを避ける：フォームPOST（safelisted）
      const body = new URLSearchParams({ type: "getEvents" });

      const res = await fetch(API_URL, {
        method: "POST",
        body
        // headers を明示しない（ブラウザが適切に設定）
      });

      show(`3) 応答受信：HTTP ${res.status}`);

      const text = await res.text();
      show(`4) 応答本文（先頭200文字）:\n${text.slice(0,200)}`);

      let data;
      try { data = JSON.parse(text); }
      catch {
        show("エラー：JSONではありません。\n\n" + text);
        return;
      }

      show("5) JSON解析成功:\n" + JSON.stringify(data, null, 2));

      list.innerHTML = "";
      const events = data.events || [];
      if (events.length === 0) {
        list.innerHTML = `<div class="card">イベントが0件です</div>`;
        return;
      }

      for (const ev of events) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div><b>${ev.event_name ?? ""}</b></div>
          <div class="muted">日付：${ev.event_date ?? ""} / 開始：${ev.event_start ?? ""}</div>
          <div class="muted">メモ：${ev.event_memo ?? ""}</div>
          <div class="muted">ID：${ev.event_id ?? ""}</div>
        `;
        list.appendChild(card);
      }

    } catch (err) {
      show("例外エラー（fetch失敗など）:\n" + (err?.message || String(err)));
    }
  }

  window.loadEvents = loadEvents;
  show("ページ読込完了：ボタンを押してください");
</script>
</body>
</html>
